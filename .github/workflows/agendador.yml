name: Executar Muth Dinamicamente
on:
  schedule:
    # Tenta rodar a cada 30 minutos automaticamente
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      ativo:
        description: 'Código do Ativo (Ex: PETR4, BTC-USD)'
        required: true
        default: 'PETR4'
      sentimento:
        description: 'Sentimento do Mestre (0.0 a 1.0)'
        required: true
        default: '0.5'

jobs:
  rodar-ia:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - name: Instalar Dependencias
      run: pip install yfinance tensorflow numpy requests
    - name: Executar Cérebro da Muth
      run: |
        # Passa os inputs do GitHub para o script Python
        python muth_brain.py "${{ github.event.inputs.ativo }}" "${{ github.event.inputs.sentimento }}"
    - name: Atualizar Site
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add dados_muth.js
        git commit -m "Muth: Nova mente gerada via automação" || echo "Sem mudanças"
        git push